backend:
  name: github
  repo: banzox/ved
  branch: main

media_folder: "public/images"
public_folder: "/images"
locale: "ar"

collections:
  - name: "database"
    label: "قاعدة البيانات"
    files:
      - label: "قائمة الأفلام"
        name: "movies_list"
        file: "src/data/movies.json"
        extension: "json"
        format: "json"
        fields:
          - name: "content"
            label: "الأفلام"
            widget: "list"
            fields:
              - {label: "رقم المعرف (ID)", name: "id", widget: "string"}
              - {label: "النوع", name: "type", widget: "hidden", default: "movie"}
              - {label: "العنوان", name: "title", widget: "string"}
              - {label: "الوصف", name: "description", widget: "text"}
              - {label: "التقييم", name: "rating", widget: "number", value_type: "float"}
              - {label: "سنة الإصدار", name: "year", widget: "number"}
              - {label: "المدة", name: "duration", widget: "string"}
              - {label: "التصنيفات (افصل بينها بـ Enter)", name: "genre", widget: "list"}
              - {label: "الصورة المصغرة (للرئيسية)", name: "image", widget: "image"}
              - {label: "صورة الخلفية (عريضة للمشاهدة)", name: "coverImage", widget: "image", required: false}
              - {label: "رابط مشغل الفيديو الخارجي", name: "videoUrl", widget: "string", required: false}
      - label: "قائمة المسلسلات"
        name: "series_list"
        file: "src/data/series.json"
        extension: "json"
        format: "json"
        fields:
          - name: "content"
            label: "المسلسلات"
            widget: "list"
            fields:
              - {label: "رقم المعرف (ID)", name: "id", widget: "string"}
              - {label: "النوع", name: "type", widget: "hidden", default: "series"}
              - {label: "العنوان", name: "title", widget: "string"}
              - {label: "الوصف", name: "description", widget: "text"}
              - {label: "التقييم", name: "rating", widget: "number", value_type: "float"}
              - {label: "سنة الإصدار", name: "year", widget: "number"}
              - {label: "عدد المواسم أو المدة", name: "duration", widget: "string", required: false}
              - {label: "التصنيفات (افصل بينها بـ Enter)", name: "genre", widget: "list"}
              - {label: "الصورة المصغرة (للرئيسية)", name: "image", widget: "image"}
              - {label: "صورة الخلفية (عريضة للمشاهدة)", name: "coverImage", widget: "image", required: false}
              - label: "الحلقات"
                name: "episodes"
                widget: "list"
                required: true
                fields:
                  - {label: "رقم الموسم", name: "season", widget: "number", default: 1}
                  - {label: "رقم الحلقة", name: "episode", widget: "number"}
                  - {label: "عنوان الحلقة (اختياري)", name: "title", widget: "string", required: false}
                  - {label: "رابط المشغل للحلقة", name: "videoUrl", widget: "string"}
